<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Character Room Viewer</title>
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: transparent;
      font-family: Arial, sans-serif;
    }

    #canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    #status {
      position: fixed;
      left: 0;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255, 255, 255, 0.75);
      text-align: center;
      font-size: 14px;
      white-space: pre-line;
      pointer-events: none;
    }
  </style>
</head>

<body>
  <canvas id="canvas"></canvas>
  <div id="status">Loading room...</div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    let scene;
    let camera;
    let renderer;
    let controls;
    let loader;
    let roomModel;
    let characterModel;
    let mixer;
    let clock;
    let currentAction;
    let defaultIdleAction;
    let statusTimer;
    let characterLoadToken = 0;
    let externalCharacterRequested = false;
    let characterAnimationClips = [];
    let accessoryModels = [];
    let characterFloorY;
    let isDraggingCharacter = false;
    let lastPointerX = 0;
    const characterFloorBox = new THREE.Box3();

    const canvas = document.getElementById('canvas');
    const status = document.getElementById('status');

    const CHARACTER_URLS = {
      character1: '/models/characters_rigged/character_1.glb',
      character2: '/models/characters_rigged/character_2.glb',
      character3: '/models/characters_rigged/character_3.glb'
    };
    const DEFAULT_IDLE_ANIMATION_URL = '/models/animations/breathing_idle.glb';
    const CHARACTER_FLOOR_OFFSET = 0.48;
    const ROOM_SCALE = 3;
    const ROOM_FLOOR_Y = 0;
    const CHARACTER_ROTATION_SPEED = 0.01;
    const ACCESSORY_BONE_CANDIDATES = {
      hair: ['Head', 'mixamorigHead', 'mixamorig_Head'],
      hat: ['Head', 'mixamorigHead', 'mixamorig_Head'],
      glasses: ['Head', 'mixamorigHead', 'mixamorig_Head'],
      mask: ['Head', 'mixamorigHead', 'mixamorig_Head'],
      back: ['Spine2', 'Spine1', 'Spine', 'mixamorigSpine2', 'mixamorigSpine1', 'mixamorigSpine'],
      wrist: ['RightHand', 'LeftHand', 'mixamorigRightHand', 'mixamorigLeftHand'],
      outfit: ['Hips', 'Root', 'mixamorigHips']
    };

    init();
    animate();

    async function init() {
      scene = new THREE.Scene();
      clock = new THREE.Clock();
      loader = new GLTFLoader();

      camera = new THREE.PerspectiveCamera(
        42,
        window.innerWidth / window.innerHeight,
        0.01,
        200
      );
      camera.position.set(0, 0.92, 5.2);

      renderer = new THREE.WebGLRenderer({
        canvas,
        alpha: true,
        antialias: true
      });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;

      const ambientLight = new THREE.AmbientLight(0xffffff, 1.6);
      scene.add(ambientLight);

      const keyLight = new THREE.DirectionalLight(0xffffff, 2.8);
      keyLight.position.set(3, 5, 4);
      keyLight.castShadow = true;
      scene.add(keyLight);

      const fillLight = new THREE.DirectionalLight(0x8b5cf6, 1.1);
      fillLight.position.set(-3, 2, 3);
      scene.add(fillLight);

      controls = new OrbitControls(camera, renderer.domElement);
      controls.enabled = false;
      controls.enableDamping = false;
      controls.enablePan = false;
      controls.enableRotate = false;
      controls.enableZoom = false;
      controls.minDistance = 2.0;
      controls.maxDistance = 7.0;
      controls.target.set(0, 0.78, 0);
      controls.update();

      window.addEventListener('resize', onResize);
      renderer.domElement.addEventListener('pointerdown', onPointerDown);
      renderer.domElement.addEventListener('pointermove', onPointerMove);
      renderer.domElement.addEventListener('pointerup', onPointerUp);
      renderer.domElement.addEventListener('pointercancel', onPointerUp);

      try {
        await loadRoom();
        if (!externalCharacterRequested && !characterModel) {
          await setCharacter('character1');
        }
        status.style.display = 'none';
      } catch (error) {
        console.error(error);
        status.style.display = 'block';
        status.innerText = 'Cannot load character room:\n' + (error?.message || error);
      }
    }

    async function loadRoom() {
      const gltf = await loader.loadAsync('/models/room/room_default.glb');
      roomModel = gltf.scene;
      roomModel.name = 'room';
      roomModel.scale.setScalar(ROOM_SCALE);
      alignRoomFloor(roomModel);
      prepareObject(roomModel);
      scene.add(roomModel);
      fitRoomToView();
    }

    function alignRoomFloor(object) {
      const box = new THREE.Box3().setFromObject(object);
      if (box.isEmpty()) return;

      object.position.y += ROOM_FLOOR_Y - box.min.y;
    }

    async function setCharacter(characterId) {
      const url = CHARACTER_URLS[characterId] || CHARACTER_URLS.character1;
      await setCharacterObject({
        id: characterId,
        name: characterId,
        base: {
          id: characterId,
          slot: 'body',
          url,
          position: [0, 0, 0],
          rotation: [0, 0, 0],
          scale: [1, 1, 1],
          hidesSlots: []
        },
        accessories: []
      });
    }

    async function setCharacterObject(characterObject) {
      const token = ++characterLoadToken;
      const base = characterObject?.base || {};
      const characterId = characterObject?.id || base.id || 'character1';
      const url = base.url || CHARACTER_URLS[characterId] || CHARACTER_URLS.character1;

      status.style.display = 'block';
      status.innerText = 'Loading ' + (characterObject?.name || characterId) + '...';

      removeCharacter(false);

      const gltf = await loader.loadAsync(url);
      if (token !== characterLoadToken) {
        disposeObject(gltf.scene);
        return;
      }

      characterModel = gltf.scene;
      characterModel.name = characterId;
      characterAnimationClips = gltf.animations || [];
      prepareObject(characterModel);

      normalizeCharacter(characterModel);
      characterFloorY = characterModel.position.y;
      scene.add(characterModel);

      mixer = new THREE.AnimationMixer(characterModel);
      defaultIdleAction = null;
      currentAction = null;

      const accessories = characterObject?.accessories || [];
      for (const accessory of accessories) {
        await loadAccessory(accessory, token);
        if (token !== characterLoadToken) return;
      }

      status.style.display = 'none';
      await playExternalAnimation(DEFAULT_IDLE_ANIMATION_URL);
    }

    async function loadAccessory(config, token) {
      if (!characterModel || !config?.url) return;

      const gltf = await loader.loadAsync(config.url);
      if (token !== characterLoadToken) {
        disposeObject(gltf.scene);
        return;
      }

      const accessory = gltf.scene;
      accessory.name = config.id || config.slot || 'accessory';
      accessory.position.set(...(config.position || [0, 0, 0]));
      accessory.rotation.set(...(config.rotation || [0, 0, 0]));
      accessory.scale.set(...(config.scale || [1, 1, 1]));
      prepareObject(accessory);

      characterModel.add(accessory);
      attachAccessoryToAnimatedBone(accessory, config.slot);
      accessoryModels.push(accessory);
    }

    function attachAccessoryToAnimatedBone(accessory, slot) {
      const bone = findAccessoryBone(characterModel, slot);
      if (!bone) return;

      characterModel.updateMatrixWorld(true);
      accessory.updateMatrixWorld(true);
      bone.attach(accessory);
    }

    function findAccessoryBone(root, slot) {
      const candidates = ACCESSORY_BONE_CANDIDATES[slot] || [];

      for (const name of candidates) {
        const direct = root.getObjectByName(name);
        if (direct?.isBone) return direct;
      }

      let fallback = null;
      root.traverse((child) => {
        if (fallback || !child.isBone) return;
        const boneName = child.name.toLowerCase().replace(/[_\s]/g, '');

        if (slot === 'hair' || slot === 'hat' || slot === 'glasses' || slot === 'mask') {
          if (boneName.endsWith('head')) fallback = child;
          return;
        }

        if (slot === 'back') {
          if (boneName.includes('spine')) fallback = child;
          return;
        }

        if (slot === 'wrist') {
          if (boneName.endsWith('hand')) fallback = child;
          return;
        }

        if (slot === 'outfit') {
          if (boneName.endsWith('hips') || boneName.endsWith('root')) fallback = child;
        }
      });

      return fallback;
    }

    async function playExternalAnimation(url) {
      if (!characterModel) return;
      if (!mixer) mixer = new THREE.AnimationMixer(characterModel);

      let nextAction;
      if (!url || url === '') {
        if (defaultIdleAction) {
          nextAction = defaultIdleAction;
        } else {
          if (currentAction) {
            const actionToStop = currentAction;
            actionToStop.fadeOut(0.3);
            window.setTimeout(() => {
              actionToStop.stop();
            }, 320);
            currentAction = null;
          }
          return;
        }
      } else {
        try {
          let clip = characterAnimationClips[0];
          if (!Object.values(CHARACTER_URLS).includes(url) || !clip) {
            const gltf = await loader.loadAsync(url);
            if (!gltf.animations?.length) return;
            clip = gltf.animations[0];
          }
          clip = createCharacterClip(clip, characterModel);
          const missingTargets = getMissingAnimationTargets(clip, characterModel);
          if (missingTargets.length > 0) {
            console.warn(
              'Animation cannot drive this character. Missing targets:',
              missingTargets
            );
            showTemporaryStatus(
              'This character is not rigged for this animation.'
            );
            return;
          }
          nextAction = mixer.clipAction(clip);
          if (url === DEFAULT_IDLE_ANIMATION_URL) {
            defaultIdleAction = nextAction;
          }
        } catch (error) {
          console.error("Failed to load animation:", error);
          return;
        }
      }

      if (nextAction && nextAction !== currentAction) {
        resetCharacterFloorPosition();
        nextAction.reset();
        nextAction.play();
        if (currentAction) {
          currentAction.crossFadeTo(nextAction, 0.3, true);
        }
        currentAction = nextAction;
      }
    }

    function resetCharacterFloorPosition() {
      if (!characterModel) return;
      characterModel.position.y = characterFloorY;
    }

    function createCharacterClip(clip, targetRoot) {
      const tracks = clip.tracks.map((track) => {
        const binding = THREE.PropertyBinding.parseTrackName(track.name);
        const targetName = binding.nodeName || '';
        const targetObject = findAnimationTarget(targetRoot, targetName);
        const mappedTrack = targetObject && targetObject.name !== targetName
          ? cloneTrackForTarget(track, targetName, targetObject.name)
          : track;

        return createGroundedTrack(mappedTrack, targetRoot);
      });

      return new THREE.AnimationClip(`${clip.name || 'animation'}_character`, clip.duration, tracks);
    }

    function findAnimationTarget(targetRoot, targetName) {
      if (!targetName || targetName === '.') return null;

      const directTarget = targetRoot.getObjectByName(targetName);
      if (directTarget) return directTarget;

      const alternateName = targetName.startsWith('mixamorig_')
        ? targetName.replace('mixamorig_', 'mixamorig')
        : targetName.replace('mixamorig', 'mixamorig_');

      return alternateName !== targetName
        ? targetRoot.getObjectByName(alternateName)
        : null;
    }

    function cloneTrackForTarget(track, sourceName, targetName) {
      const trackName = track.name.replace(sourceName, targetName);

      if (track.ValueTypeName === 'quaternion') {
        return new THREE.QuaternionKeyframeTrack(
          trackName,
          track.times.slice(),
          track.values.slice(),
          track.getInterpolation()
        );
      }

      return new THREE.VectorKeyframeTrack(
        trackName,
        track.times.slice(),
        track.values.slice(),
        track.getInterpolation()
      );
    }

    function createGroundedTrack(track, targetRoot) {
        const binding = THREE.PropertyBinding.parseTrackName(track.name);
        const targetName = binding.nodeName || '';
        const propertyName = binding.propertyName || '';
        const isRootVerticalTrack =
          propertyName === 'position' &&
          /(hips|root)$/i.test(targetName);

        if (!isRootVerticalTrack) return track;

        const groundedValues = track.values.slice();
        const targetObject = targetRoot.getObjectByName(targetName);
        const groundedY = targetObject ? targetObject.position.y : groundedValues[1];

        for (let i = 1; i < groundedValues.length; i += 3) {
          groundedValues[i] = groundedY;
        }

        return new THREE.VectorKeyframeTrack(
          track.name,
          track.times.slice(),
          groundedValues,
          track.getInterpolation()
        );
    }

    function keepCharacterOnFloor() {
      if (!characterModel) return;

      characterModel.updateMatrixWorld(true);
      characterFloorBox.setFromObject(characterModel);
      if (characterFloorBox.isEmpty()) return;

      characterModel.position.y += CHARACTER_FLOOR_OFFSET - characterFloorBox.min.y;
    }

    function getMissingAnimationTargets(clip, targetRoot) {
      const missing = new Set();

      for (const track of clip.tracks) {
        const targetName = THREE.PropertyBinding.parseTrackName(track.name).nodeName;
        if (!targetName || targetName === '.') continue;
        if (!findAnimationTarget(targetRoot, targetName)) {
          missing.add(targetName);
        }
      }

      return Array.from(missing);
    }

    function showTemporaryStatus(message) {
      window.clearTimeout(statusTimer);
      status.style.display = 'block';
      status.innerText = message;
      statusTimer = window.setTimeout(() => {
        status.style.display = 'none';
      }, 2500);
    }

    function removeCharacter(invalidateLoad = true) {
      if (invalidateLoad) characterLoadToken++;
      mixer = null;
      characterAnimationClips = [];
      accessoryModels = [];

      if (!characterModel) return;
      scene.remove(characterModel);
      disposeObject(characterModel);
      characterModel = null;
    }

    function prepareObject(object) {
      object.traverse((child) => {
        if (child.isMesh) {
          child.castShadow = true;
          child.receiveShadow = true;
          child.frustumCulled = false;
          if (child.material) {
            child.material.needsUpdate = true;
          }
        }
      });
    }

    function normalizeCharacter(object) {
      object.position.set(0, 0, 0);
      object.rotation.set(0, 0, 0);
      object.scale.set(1, 1, 1);

      const box = new THREE.Box3().setFromObject(object);
      const size = box.getSize(new THREE.Vector3());
      const center = box.getCenter(new THREE.Vector3());
      const targetHeight = 1.65;
      const scale = size.y > 0 ? targetHeight / size.y : 1;

      object.scale.setScalar(scale);

      const scaledBox = new THREE.Box3().setFromObject(object);
      const scaledCenter = scaledBox.getCenter(new THREE.Vector3());
      const scaledMin = scaledBox.min;

      object.position.x -= scaledCenter.x;
      object.position.y -= scaledMin.y;
      object.position.y += CHARACTER_FLOOR_OFFSET;
      object.position.z -= scaledCenter.z;
    }

    function fitRoomToView() {
      if (!roomModel) return;

      const box = new THREE.Box3().setFromObject(roomModel);
      if (box.isEmpty()) return;

      const center = box.getCenter(new THREE.Vector3());
      const size = box.getSize(new THREE.Vector3());
      const maxSize = Math.max(size.x, size.y, size.z);
      const distance = Math.max(maxSize * 1.15, 5.2);

      controls.target.set(center.x, Math.max(center.y + 0.34, 0.74), center.z);
      camera.position.set(
        center.x,
        Math.max(center.y + 0.46, 0.92),
        center.z + distance * 1.18
      );
      camera.near = 0.01;
      camera.far = Math.max(200, distance * 10);
      camera.updateProjectionMatrix();
      controls.update();
    }

    function disposeObject(object) {
      object.traverse((child) => {
        if (!child.isMesh) return;
        child.geometry?.dispose?.();
        if (Array.isArray(child.material)) {
          child.material.forEach((material) => material.dispose?.());
        } else {
          child.material?.dispose?.();
        }
      });
    }

    function animate() {
      requestAnimationFrame(animate);
      const delta = clock ? clock.getDelta() : 0;
      if (mixer) {
        mixer.update(delta);
        keepCharacterOnFloor();
      }
      if (controls) controls.update();
      renderer.render(scene, camera);
    }

    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function onPointerDown(event) {
      if (!characterModel) return;

      isDraggingCharacter = true;
      lastPointerX = event.clientX;
      renderer.domElement.setPointerCapture?.(event.pointerId);
    }

    function onPointerMove(event) {
      if (!isDraggingCharacter || !characterModel) return;

      const deltaX = event.clientX - lastPointerX;
      lastPointerX = event.clientX;
      characterModel.rotation.y += deltaX * CHARACTER_ROTATION_SPEED;
    }

    function onPointerUp(event) {
      isDraggingCharacter = false;
      renderer.domElement.releasePointerCapture?.(event.pointerId);
    }

    window.setCharacter = function (characterId) {
      externalCharacterRequested = true;
      setCharacter(characterId).catch((error) => {
        console.error(error);
        status.style.display = 'block';
        status.innerText = 'Cannot switch character:\n' + (error?.message || error);
      });
    };

    window.setCharacterObject = function (characterObject) {
      externalCharacterRequested = true;
      setCharacterObject(characterObject).catch((error) => {
        console.error(error);
        status.style.display = 'block';
        status.innerText = 'Cannot load saved character:\n' + (error?.message || error);
      });
    };

    window.playExternalAnimation = function (url) {
      playExternalAnimation(url);
    };
  </script>
</body>

</html>
